name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build solution
        run: dotnet build intercal64.sln

      - name: Build syslib
        run: |
          dotnet churn.dll ${{ github.workspace }}/syslib64/syslib64.ic64 -t:library -b -noplease
          if (!(Test-Path syslib64.dll)) { Write-Error "syslib64.dll not found in bin/"; exit 1 }
        shell: pwsh
        working-directory: bin

      - name: Test
        run: dotnet test intercal64.tests/intercal64.tests.csproj --no-build
