name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build compiler and syslib
        run: dotnet build churn/churn.csproj

      - name: Build solution
        run: dotnet build intercal64.sln

      - name: Test
        run: dotnet test intercal64.tests/intercal64.tests.csproj --no-build
