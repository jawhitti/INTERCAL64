name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            rid: osx-arm64
          - os: macos-14
            rid: osx-x64
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build package
        run: bash build/package.sh ${{ matrix.rid }} ${{ github.ref_name }}

      - name: Build Windows installer
        if: matrix.rid == 'win-x64'
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $distDir = "${{ github.workspace }}\dist\win-x64"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DAppVersion=$version `
            /DDistDir=$distDir `
            /O"${{ github.workspace }}\dist" `
            build/installer/intercal64.iss
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: intercal64-${{ matrix.rid }}
          path: dist/intercal64-*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
